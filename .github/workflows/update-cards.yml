name: Update README cards

# Generates the stats cards as SVG files inside this repo, so the profile
# never depends on a third-party server that can be rate-limited or down.

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC (03:00 in Rio)
  push:
    branches: [main, master]
  workflow_dispatch:      # lets you run it manually from the Actions tab

jobs:
  cards:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&hide_rank=true&hide_border=true&bg_color=07070D&title_color=00E1A0&icon_color=00E1A0&text_color=C9D1D9&border_radius=10"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=8&hide_border=true&bg_color=07070D&title_color=00E1A0&text_color=C9D1D9&border_radius=10"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update README cards" || exit 0
          git push
